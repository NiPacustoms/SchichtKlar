name: Configure Firebase Storage CORS

on:
  workflow_dispatch:
    inputs:
      bucket:
        description: 'Storage bucket (defaults to <projectId>.appspot.com)'
        required: false
        default: ''

jobs:
  set-cors:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Google Cloud SDK
        run: |
          sudo apt-get update -y
          sudo apt-get install -y curl apt-transport-https ca-certificates gnupg
          echo "deb [signed-by=/usr/share/keyrings/cloud.google.gpg] https://packages.cloud.google.com/apt cloud-sdk main" | sudo tee -a /etc/apt/sources.list.d/google-cloud-sdk.list
          curl https://packages.cloud.google.com/apt/doc/apt-key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/cloud.google.gpg
          sudo apt-get update -y && sudo apt-get install -y google-cloud-sdk

      - name: Write service account key
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JobFlow }}
        run: |
          echo "$FIREBASE_SERVICE_ACCOUNT" > ${{ github.workspace }}/firebase-service-account.json

      - name: Authenticate gcloud
        run: |
          gcloud auth activate-service-account --key-file=${{ github.workspace }}/firebase-service-account.json
          PROJECT_ID=$(python3 -c "import json;print(json.load(open('${{ github.workspace }}/firebase-service-account.json')).get('project_id',''))")
          echo "PROJECT_ID=$PROJECT_ID" >> $GITHUB_ENV
          gcloud config set project "$PROJECT_ID"

      - name: Determine bucket
        env:
          INPUT_BUCKET: ${{ github.event.inputs.bucket }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ vars.NEXT_PUBLIC_FIREBASE_PROJECT_ID || secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID || '' }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ vars.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET || secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET || '' }}
        run: |
          if [ -n "$INPUT_BUCKET" ]; then BKT="$INPUT_BUCKET"; 
          elif [ -n "$NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET" ]; then BKT="$NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET";
          elif [ -n "$NEXT_PUBLIC_FIREBASE_PROJECT_ID" ]; then BKT="${NEXT_PUBLIC_FIREBASE_PROJECT_ID}.appspot.com";
          elif [ -n "$PROJECT_ID" ]; then BKT="${PROJECT_ID}.appspot.com"; else echo "No bucket resolved"; exit 1; fi
          echo "BUCKET=$BKT" >> $GITHUB_ENV
          echo "Using bucket: $BKT"

      - name: Apply CORS
        run: |
          gsutil cors set scripts/storage-cors.json gs://$BUCKET
          echo "Current CORS:"
          gsutil cors get gs://$BUCKET || true

      - name: Cleanup key
        if: always()
        run: rm -f ${{ github.workspace }}/firebase-service-account.json || true
