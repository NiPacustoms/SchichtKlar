name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

env:
  NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY || 'ci-placeholder' }}
  NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN || 'ci-placeholder.firebaseapp.com' }}
  NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID || 'ci-placeholder' }}
  NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET || 'ci-placeholder.appspot.com' }}
  NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID || '0' }}
  NEXT_PUBLIC_FIREBASE_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID || '1:0:web:0' }}
  # Legal-Platzhalter für CI-Builds: validateLegalConfig() blockiert `next build`
  # (NODE_ENV=production) ohne diese Werte. Produktions-Deploys setzen echte Daten.
  NEXT_PUBLIC_COMPANY_NAME: ${{ vars.NEXT_PUBLIC_COMPANY_NAME || 'CI Placeholder UG' }}
  NEXT_PUBLIC_COMPANY_STREET: ${{ vars.NEXT_PUBLIC_COMPANY_STREET || 'CI-Weg 1' }}
  NEXT_PUBLIC_COMPANY_CITY: ${{ vars.NEXT_PUBLIC_COMPANY_CITY || 'Berlin' }}
  NEXT_PUBLIC_COMPANY_ZIP: ${{ vars.NEXT_PUBLIC_COMPANY_ZIP || '10115' }}
  NEXT_PUBLIC_COMPANY_EMAIL: ${{ vars.NEXT_PUBLIC_COMPANY_EMAIL || 'ci@example.invalid' }}

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Typecheck
        run: npm run typecheck

      - name: Unit-Tests
        run: npm run test:unit

      - name: Build
        run: npm run build

  e2e:
    runs-on: ubuntu-latest
    needs: verify
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Install Playwright
        run: npx playwright install --with-deps

      - name: Start server
        run: npm run start &
        env:
          PORT: 3000

      - name: Wait for server
        run: sleep 25

      - name: E2E
        run: npm run test:e2e
        env:
          CI: 1
          PLAYWRIGHT_BASE_URL: http://127.0.0.1:3000
