name: Deploy to Firebase Hosting

on:
  push:
    branches: ['**']
  pull_request:

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      - name: Reset npm config (safety)
        run: |
          npm config delete only || true
          npm config delete omit || true
          npm config delete legacy-peer-deps || true
      - name: Install dependencies (force include dev)
        run: |
          NPM_CONFIG_OMIT= npm install --include=dev --no-audit --no-fund
      - name: Lint (CI)
        run: npx eslint . --quiet --rule '@typescript-eslint/no-explicit-any:off' --rule 'react/no-unescaped-entities:off' --rule 'no-empty:off' --rule 'react/jsx-key:off' --rule 'no-unreachable:off' --rule 'no-useless-escape:off'
      - name: Typecheck (CI)
        run: npm run typecheck:ci
      - name: Static Scan
        run: node scripts/static-scan.js

  deploy-production:
    needs: verify
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Reset npm config (safety)
        run: |
          npm config delete only || true
          npm config delete omit || true
          npm config delete legacy-peer-deps || true

      - name: Install dependencies
        run: |
          NPM_CONFIG_OMIT= npm install --include=dev --no-audit --no-fund

      - name: Set Firebase environment variables (from Secrets/Vars)
        env:
          FB_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY || vars.NEXT_PUBLIC_FIREBASE_API_KEY || '' }}
          FB_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN || vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN || '' }}
          FB_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID || vars.NEXT_PUBLIC_FIREBASE_PROJECT_ID || '' }}
          FB_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET || vars.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET || '' }}
          FB_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID || vars.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID || '' }}
          FB_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID || vars.NEXT_PUBLIC_FIREBASE_APP_ID || '' }}
        run: |
          echo "NEXT_PUBLIC_FIREBASE_API_KEY=${FB_API_KEY}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${FB_AUTH_DOMAIN}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${FB_PROJECT_ID}" >> $GITHUB_ENV
          # Normalize storage bucket to <projectId>.appspot.com if empty or wrong
          if [ -z "${FB_STORAGE_BUCKET}" ] && [ -n "${FB_PROJECT_ID}" ]; then
            echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${FB_PROJECT_ID}.appspot.com" >> $GITHUB_ENV
          else
            echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${FB_STORAGE_BUCKET}" >> $GITHUB_ENV
          fi
          echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${FB_MESSAGING_SENDER_ID}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_FIREBASE_APP_ID=${FB_APP_ID}" >> $GITHUB_ENV

      - name: Set legal/company environment variables (from Vars)
        env:
          LEGAL_COMPANY_NAME: ${{ vars.NEXT_PUBLIC_COMPANY_NAME || '' }}
          LEGAL_STREET: ${{ vars.NEXT_PUBLIC_COMPANY_STREET || '' }}
          LEGAL_CITY: ${{ vars.NEXT_PUBLIC_COMPANY_CITY || '' }}
          LEGAL_ZIP: ${{ vars.NEXT_PUBLIC_COMPANY_ZIP || '' }}
          LEGAL_EMAIL: ${{ vars.NEXT_PUBLIC_COMPANY_EMAIL || '' }}
        run: |
          echo "NEXT_PUBLIC_COMPANY_NAME=${LEGAL_COMPANY_NAME}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_COMPANY_STREET=${LEGAL_STREET}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_COMPANY_CITY=${LEGAL_CITY}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_COMPANY_ZIP=${LEGAL_ZIP}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_COMPANY_EMAIL=${LEGAL_EMAIL}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_APP_ENV=production" >> $GITHUB_ENV

      - name: Install Functions Dependencies
        run: |
          cd functions
          npm ci --no-audit --no-fund
          cd ..

      - name: Setup Firebase CLI and Verify Service Account
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JobFlow }}
        run: |
          npm install -g firebase-tools@latest
          echo "$FIREBASE_SERVICE_ACCOUNT" > ${{ github.workspace }}/firebase-service-account.json
          echo "GOOGLE_APPLICATION_CREDENTIALS=${{ github.workspace }}/firebase-service-account.json" >> $GITHUB_ENV
          echo "Verifying Service Account permissions..."
          SERVICE_ACCOUNT_EMAIL=$(python3 -c "import json; d=json.load(open('${{ github.workspace }}/firebase-service-account.json')); print(d.get('client_email', 'N/A'))" || echo "N/A")
          echo "🔍 Service Account Email: $SERVICE_ACCOUNT_EMAIL"
          echo "⚠️ IMPORTANT: If deployment fails, ensure these roles are added to: $SERVICE_ACCOUNT_EMAIL"
          echo "   - Firebase Extensions API Admin (roles/firebaseextensions.admin)"
          echo "   - Artifact Registry Administrator (roles/artifactregistry.admin)"
          echo "   - Compute Viewer (roles/compute.viewer)"
          echo "   - Service Usage Admin (roles/serviceusage.serviceUsageAdmin)"
          echo "   See docs/FIREBASE_SERVICE_ACCOUNT_PERMISSIONS.md for details"
          echo "Testing Firebase authentication..."
          export GOOGLE_APPLICATION_CREDENTIALS=${{ github.workspace }}/firebase-service-account.json
          firebase projects:list 2>&1 || echo "Note: projects:list check completed"
          firebase functions:list --project jobflow25 2>&1 || echo "Note: functions:list may fail if no functions exist or permissions are limited"
          echo "✅ Service Account verification completed"

      - name: Auto-setup Service Account (if needed)
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JobFlow }}
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase-service-account.json
        run: |
          if [ -f "scripts/setup-service-account.sh" ]; then
            echo "🔧 Auto-Setup verfügbar, aber überspringe (Service Account bereits konfiguriert)"
            echo "💡 Führe lokal aus für Setup: npm run firebase:setup"
          fi
        continue-on-error: true
      - name: Setup Artifact Registry Cleanup Policy (optional)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase-service-account.json
        run: |
          echo "⚠️  Attempting to setup cleanup policy..."
          firebase functions:artifacts:setpolicy --project jobflow25 --location europe-west1 2>&1 || echo "⚠️  Cleanup policy setup failed (will continue with --force)"
        continue-on-error: true
      - name: Create .env.production for Next.js build (legal vars)
        run: |
          {
            echo "NEXT_PUBLIC_APP_ENV=production"
            echo "NEXT_PUBLIC_COMPANY_NAME=$NEXT_PUBLIC_COMPANY_NAME"
            echo "NEXT_PUBLIC_COMPANY_STREET=$NEXT_PUBLIC_COMPANY_STREET"
            echo "NEXT_PUBLIC_COMPANY_CITY=$NEXT_PUBLIC_COMPANY_CITY"
            echo "NEXT_PUBLIC_COMPANY_ZIP=$NEXT_PUBLIC_COMPANY_ZIP"
            echo "NEXT_PUBLIC_COMPANY_EMAIL=$NEXT_PUBLIC_COMPANY_EMAIL"
          } >> .env.production
          echo "Created .env.production with legal vars for next build"
      - name: Deploy to Firebase Hosting (production)
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase-service-account.json
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ env.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ env.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ env.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ env.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ env.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ env.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_APP_ENV: production
          NEXT_PUBLIC_COMPANY_NAME: ${{ env.NEXT_PUBLIC_COMPANY_NAME }}
          NEXT_PUBLIC_COMPANY_STREET: ${{ env.NEXT_PUBLIC_COMPANY_STREET }}
          NEXT_PUBLIC_COMPANY_CITY: ${{ env.NEXT_PUBLIC_COMPANY_CITY }}
          NEXT_PUBLIC_COMPANY_ZIP: ${{ env.NEXT_PUBLIC_COMPANY_ZIP }}
          NEXT_PUBLIC_COMPANY_EMAIL: ${{ env.NEXT_PUBLIC_COMPANY_EMAIL }}
        run: |
          firebase deploy --only hosting --project jobflow25 --force
      - name: Cleanup service account file
        if: always()
        run: |
          rm -f ${{ github.workspace }}/firebase-service-account.json || true

  deploy-preview:
    needs: verify
    if: github.ref != 'refs/heads/main'
    runs-on: ubuntu-latest
    continue-on-error: true
    permissions:
      contents: read
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Reset npm config (safety)
        run: |
          npm config delete only || true
          npm config delete omit || true
          npm config delete legacy-peer-deps || true

      - name: Install dependencies
        run: |
          NPM_CONFIG_OMIT= npm install --include=dev --no-audit --no-fund

      - name: Set Firebase environment variables (from Secrets/Vars)
        env:
          FB_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY || vars.NEXT_PUBLIC_FIREBASE_API_KEY || '' }}
          FB_AUTH_DOMAIN: ${{ secrets.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN || vars.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN || '' }}
          FB_PROJECT_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_PROJECT_ID || vars.NEXT_PUBLIC_FIREBASE_PROJECT_ID || '' }}
          FB_STORAGE_BUCKET: ${{ secrets.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET || vars.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET || '' }}
          FB_MESSAGING_SENDER_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID || vars.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID || '' }}
          FB_APP_ID: ${{ secrets.NEXT_PUBLIC_FIREBASE_APP_ID || vars.NEXT_PUBLIC_FIREBASE_APP_ID || '' }}
        run: |
          echo "NEXT_PUBLIC_FIREBASE_API_KEY=${FB_API_KEY}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN=${FB_AUTH_DOMAIN}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID=${FB_PROJECT_ID}" >> $GITHUB_ENV
          # Normalize storage bucket to <projectId>.appspot.com if empty or wrong
          if [ -z "${FB_STORAGE_BUCKET}" ] && [ -n "${FB_PROJECT_ID}" ]; then
            echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${FB_PROJECT_ID}.appspot.com" >> $GITHUB_ENV
          else
            echo "NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET=${FB_STORAGE_BUCKET}" >> $GITHUB_ENV
          fi
          echo "NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID=${FB_MESSAGING_SENDER_ID}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_FIREBASE_APP_ID=${FB_APP_ID}" >> $GITHUB_ENV

      - name: Set legal/company environment variables (from Vars)
        env:
          LEGAL_COMPANY_NAME: ${{ vars.NEXT_PUBLIC_COMPANY_NAME || '' }}
          LEGAL_STREET: ${{ vars.NEXT_PUBLIC_COMPANY_STREET || '' }}
          LEGAL_CITY: ${{ vars.NEXT_PUBLIC_COMPANY_CITY || '' }}
          LEGAL_ZIP: ${{ vars.NEXT_PUBLIC_COMPANY_ZIP || '' }}
          LEGAL_EMAIL: ${{ vars.NEXT_PUBLIC_COMPANY_EMAIL || '' }}
        run: |
          echo "NEXT_PUBLIC_COMPANY_NAME=${LEGAL_COMPANY_NAME}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_COMPANY_STREET=${LEGAL_STREET}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_COMPANY_CITY=${LEGAL_CITY}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_COMPANY_ZIP=${LEGAL_ZIP}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_COMPANY_EMAIL=${LEGAL_EMAIL}" >> $GITHUB_ENV
          echo "NEXT_PUBLIC_APP_ENV=production" >> $GITHUB_ENV

      - name: Install Functions Dependencies
        run: |
          cd functions
          npm ci --no-audit --no-fund
          cd ..

      - name: Setup Firebase CLI and Verify Service Account
        env:
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JobFlow }}
        run: |
          npm install -g firebase-tools@latest
          echo "$FIREBASE_SERVICE_ACCOUNT" > ${{ github.workspace }}/firebase-service-account.json
          echo "${{ github.workspace }}/firebase-service-account.json" >> $GITHUB_ENV
          echo "Verifying Service Account permissions..."
          SERVICE_ACCOUNT_EMAIL=$(python3 -c "import json; d=json.load(open('${{ github.workspace }}/firebase-service-account.json')); print(d.get('client_email', 'N/A'))" || echo "N/A")
          echo "🔍 Service Account Email: $SERVICE_ACCOUNT_EMAIL"
          echo "⚠️ IMPORTANT: If deployment fails, ensure these roles are added to: $SERVICE_ACCOUNT_EMAIL"
          echo "   - Firebase Extensions API Admin (roles/firebaseextensions.admin)"
          echo "   - Artifact Registry Administrator (roles/artifactregistry.admin)"
          echo "   - Compute Viewer (roles/compute.viewer)"
          echo "   - Service Usage Admin (roles/serviceusage.serviceUsageAdmin)"
          echo "   See docs/FIREBASE_SERVICE_ACCOUNT_PERMISSIONS.md for details"
          GOOGLE_APPLICATION_CREDENTIALS=${{ github.workspace }}/firebase-service-account.json firebase functions:list 2>&1 || echo "Functions list check completed (may fail if no functions exist)"
      - name: Setup Artifact Registry Cleanup Policy (optional)
        env:
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase-service-account.json
        run: |
          echo "⚠️  Attempting to setup cleanup policy..."
          if firebase functions:artifacts:setpolicy --project jobflow25 --location europe-west1 2>&1; then
            echo "✅ Cleanup policy setup successful"
          else
            echo "⚠️  Cleanup policy setup failed - this is non-blocking"
            echo "💡 To fix: Add 'Artifact Registry Administrator' role to Service Account"
            echo "💡 Or run manually: firebase functions:artifacts:setpolicy --location europe-west1"
          fi
        continue-on-error: true
      - name: Create .env.production for Next.js build (legal vars)
        run: |
          {
            echo "NEXT_PUBLIC_APP_ENV=production"
            echo "NEXT_PUBLIC_COMPANY_NAME=$NEXT_PUBLIC_COMPANY_NAME"
            echo "NEXT_PUBLIC_COMPANY_STREET=$NEXT_PUBLIC_COMPANY_STREET"
            echo "NEXT_PUBLIC_COMPANY_CITY=$NEXT_PUBLIC_COMPANY_CITY"
            echo "NEXT_PUBLIC_COMPANY_ZIP=$NEXT_PUBLIC_COMPANY_ZIP"
            echo "NEXT_PUBLIC_COMPANY_EMAIL=$NEXT_PUBLIC_COMPANY_EMAIL"
          } >> .env.production
          echo "Created .env.production with legal vars for next build"
      - name: Deploy to Firebase Hosting (preview)
        env:
          FIREBASE_CLI_EXPERIMENTS: webframeworks
          GOOGLE_APPLICATION_CREDENTIALS: ${{ github.workspace }}/firebase-service-account.json
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ env.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: ${{ env.NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN }}
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ env.NEXT_PUBLIC_FIREBASE_PROJECT_ID }}
          NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET: ${{ env.NEXT_PUBLIC_FIREBASE_STORAGE_BUCKET }}
          NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID: ${{ env.NEXT_PUBLIC_FIREBASE_MESSAGING_SENDER_ID }}
          NEXT_PUBLIC_FIREBASE_APP_ID: ${{ env.NEXT_PUBLIC_FIREBASE_APP_ID }}
          NEXT_PUBLIC_APP_ENV: production
          NEXT_PUBLIC_COMPANY_NAME: ${{ env.NEXT_PUBLIC_COMPANY_NAME }}
          NEXT_PUBLIC_COMPANY_STREET: ${{ env.NEXT_PUBLIC_COMPANY_STREET }}
          NEXT_PUBLIC_COMPANY_CITY: ${{ env.NEXT_PUBLIC_COMPANY_CITY }}
          NEXT_PUBLIC_COMPANY_ZIP: ${{ env.NEXT_PUBLIC_COMPANY_ZIP }}
          NEXT_PUBLIC_COMPANY_EMAIL: ${{ env.NEXT_PUBLIC_COMPANY_EMAIL }}
        run: |
          firebase hosting:channel:deploy ${{ github.ref_name }} --only hosting --project jobflow25 --expires 7d --force
      - name: Cleanup service account file
        if: always()
        run: |
          rm -f ${{ github.workspace }}/firebase-service-account.json || true
